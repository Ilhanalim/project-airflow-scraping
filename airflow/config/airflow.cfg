# Airflow 2.8.4 Configuration
# Optional: Override default settings if needed

[core]
# Executor type
executor = LocalExecutor

# Number of parallel DAG runs
parallelism = 2

# Number of task instances to run per DAG
dag_concurrency = 2

# Enable DAG serialization for faster UI rendering
dag_serialization = True

[webserver]
# Update interval for DAG refresh in UI
dag_refresh_interval = 60

[scheduler]
# Check for new DAGs interval
dag_dir_list_interval = 300

[logging]
# Log retention
log_retention_days = 30
